<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Matrix | Antonio Riyanto</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Base & Smooth Scrolling */
        html { scroll-behavior: smooth; }
        
        body {
            background-color: #030303;
            color: #e5e5e5;
            font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        }
        ::selection {
            background-color: rgba(0, 240, 255, 0.3);
        }
        /* Custom Gradients & Glassmorphism */
        .text-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-accent {
            background: linear-gradient(135deg, #00f0ff 0%, #0057ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-hover:hover {
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
            border-color: rgba(0, 240, 255, 0.3);
        }
        /* Vanilla JS Animation Classes */
        .fade-in-element {
            transition-property: opacity, transform;
            transition-duration: 1000ms;
            transition-timing-function: cubic-bezier(0, 0, 0.2, 1);
            will-change: transform, opacity;
            opacity: 0;
        }
        
        .fade-up { transform: translateY(3rem); }
        .fade-right { transform: translateX(-3rem); }
        .fade-left { transform: translateX(3rem); }
        
        .fade-in-element.is-visible {
            opacity: 1;
            transform: translate(0) scale(1);
        }
        
        /* Custom SVG Styling for the Radar Chart */
        #skillRadar text {
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        .radar-wrapper {
            position: relative;
        }
        .radar-wrapper::before {
            content: '';
            position: absolute;
            inset: 10%;
            background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden relative">
    <!-- Interactive Cursor Spotlight -->
    <div id="spotlight" class="fixed inset-0 pointer-events-none z-0 transition-opacity duration-300 hidden md:block"
         style="background: radial-gradient(800px circle at 0px 0px, rgba(0, 240, 255, 0.04), transparent 40%)">
    </div>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/1234567890" target="_blank" rel="noopener noreferrer"
       class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[100] bg-transparent border border-[#25D366] text-[#25D366] p-4 rounded-full shadow-[0_0_20px_rgba(37,211,102,0.5)] hover:scale-110 hover:shadow-[0_0_30px_rgba(37,211,102,0.9)] hover:bg-[#25D366]/10 backdrop-blur-md transition-all duration-300 flex items-center justify-center group"
       aria-label="Chat on WhatsApp">
        <i class="ph ph-whatsapp-logo text-3xl"></i>
    </a>

    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 py-6 bg-transparent">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tighter text-white flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-full glass-panel flex items-center justify-center group-hover:bg-white/10 transition-colors">
                    <i class="ph ph-arrow-left text-white"></i>
                </div>
                <span class="text-sm font-medium ml-2">Back to Portfolio</span>
            </a>
            <div class="hidden md:flex gap-8 text-sm font-medium text-neutral-400">
                <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-[#00f0ff] to-[#0057ff]"></div>
                <span class="text-white font-bold tracking-tighter">Antonio.</span>
            </div>
        </div>
    </nav>

    <main class="relative z-10 pt-32 pb-24">
        <!-- Ambient Background Glows -->
        <div class="fixed top-40 right-0 w-[40vw] h-[40vw] bg-[#0057ff] rounded-full blur-[150px] opacity-[0.05] pointer-events-none -z-10"></div>
        <div class="fixed bottom-0 left-0 w-[50vw] h-[50vw] bg-[#00f0ff] rounded-full blur-[180px] opacity-[0.03] pointer-events-none -z-10"></div>

        <div class="max-w-7xl mx-auto px-6 md:px-12">
            
            <!-- Section Header -->
            <div class="mb-16 flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <div class="fade-in-element fade-up inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur-sm mb-6">
                        <span class="w-2 h-2 rounded-full bg-[#00f0ff] animate-pulse"></span>
                        <span class="text-xs font-medium tracking-wide uppercase text-neutral-300">Core Arsenal</span>
                    </div>
                    <h1 class="fade-in-element fade-up text-5xl md:text-7xl font-extrabold tracking-tighter leading-[1.1]" style="transition-delay: 100ms;">
                        Skill <span class="text-gradient-accent italic pr-4">Matrix.</span>
                    </h1>
                </div>
                <div class="fade-in-element fade-up hidden md:flex items-center gap-3 text-sm tracking-widest text-neutral-500 uppercase font-medium" style="transition-delay: 200ms;">
                    <div class="w-12 h-[1px] bg-white/20"></div>
                    Proficiency / 100
                </div>
            </div>

            <!-- Tab Navigation for Hard / Soft Skills -->
            <div class="fade-in-element fade-up flex flex-wrap gap-4 mb-10" style="transition-delay: 250ms;">
                <button id="btn-hardskills" onclick="switchTab('hard')" class="px-6 py-2 rounded-full border border-[#00f0ff] bg-[#00f0ff]/10 text-white font-medium tracking-wide transition-all shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                    Software Mastery
                </button>
                <button id="btn-softskills" onclick="switchTab('soft')" class="px-6 py-2 rounded-full border border-white/10 bg-white/5 text-neutral-400 font-medium tracking-wide hover:text-white hover:bg-white/10 transition-all">
                    Creative Traits
                </button>
            </div>

            <div class="grid lg:grid-cols-12 gap-12 lg:gap-20 items-center">
                
                <!-- Radar Chart Container (Left) -->
                <div class="lg:col-span-7 flex justify-center fade-in-element fade-right" style="transition-delay: 300ms;">
                    <div class="radar-wrapper w-full max-w-[600px] aspect-square relative flex items-center justify-center p-4">
                        <svg id="skillRadar" width="100%" height="100%" viewBox="-50 -50 700 700" class="relative z-10 drop-shadow-2xl"></svg>
                    </div>
                </div>

                <!-- Skills List Panel (Right) -->
                <div id="skills-list" class="lg:col-span-5 space-y-4 fade-in-element fade-left" style="transition-delay: 400ms;">
                    <!-- Dynamically populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-white/5 bg-[#030303] relative z-10 mt-12">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded-full bg-gradient-to-tr from-[#00f0ff] to-[#0057ff]"></div>
                <span class="font-bold tracking-tighter text-lg">Antonio.</span>
            </div>
            
            <p class="text-neutral-500 text-sm" id="copyright-year">
                © <span id="year"></span> Antonio Riyanto. All rights reserved.
            </p>
            
            <div class="flex gap-4">
                <a href="#" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-neutral-400 hover:text-white hover:border-[#00f0ff]/50 transition-all">
                    <i class="ph ph-twitter-logo text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-neutral-400 hover:text-white hover:border-[#00f0ff]/50 transition-all">
                    <i class="ph ph-instagram-logo text-lg"></i>
                </a>
                <a href="#" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-neutral-400 hover:text-white hover:border-[#00f0ff]/50 transition-all">
                    <i class="ph ph-linkedin-logo text-lg"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- JavaScript Interactions -->
    <script>
        // Set dynamic year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Cursor Spotlight Effect
        const spotlight = document.getElementById('spotlight');
        window.addEventListener('mousemove', (e) => {
            if (spotlight) {
                spotlight.style.background = `radial-gradient(800px circle at ${e.clientX}px ${e.clientY}px, rgba(0, 240, 255, 0.04), transparent 40%)`;
            }
        });

        // Navbar Scroll Blur Effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('py-4', 'glass-panel', 'bg-[#030303]/80');
                navbar.classList.remove('py-6', 'bg-transparent');
            } else {
                navbar.classList.remove('py-4', 'glass-panel', 'bg-[#030303]/80');
                navbar.classList.add('py-6', 'bg-transparent');
            }
        });

        // Intersection Observer for Reveal/Fade Animations
        const fadeElements = document.querySelectorAll('.fade-in-element');
        const observerOptions = { root: null, rootMargin: '0px', threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);
        fadeElements.forEach(el => observer.observe(el));

        // Data for Skills
        const hardSkillsData = [
            { name: "Adobe Illustrator", score: 90 },
            { name: "Adobe Photoshop", score: 90 },
            { name: "Adobe After Effects", score: 80 },
            { name: "Adobe Premiere Pro", score: 80 },
            { name: "Adobe InDesign", score: 85 },
            { name: "Figma / UI Design", score: 85 }
        ];

        const softSkillsData = [
            { name: "Brand Strategy", score: 90 },
            { name: "Communication", score: 90 },
            { name: "Conceptual Thinking", score: 85 },
            { name: "Typography & Color", score: 85 },
            { name: "Layout & Comp", score: 85 },
            { name: "Project Management", score: 80 }
        ];

        let currentSkills = hardSkillsData;

        function switchTab(tab) {
            const btnHard = document.getElementById('btn-hardskills');
            const btnSoft = document.getElementById('btn-softskills');
            
            if (tab === 'hard') {
                currentSkills = hardSkillsData;
                btnHard.className = "px-6 py-2 rounded-full border border-[#00f0ff] bg-[#00f0ff]/10 text-white font-medium tracking-wide transition-all shadow-[0_0_15px_rgba(0,240,255,0.2)]";
                btnSoft.className = "px-6 py-2 rounded-full border border-white/10 bg-white/5 text-neutral-400 font-medium tracking-wide hover:text-white hover:bg-white/10 transition-all";
            } else {
                currentSkills = softSkillsData;
                btnSoft.className = "px-6 py-2 rounded-full border border-[#00f0ff] bg-[#00f0ff]/10 text-white font-medium tracking-wide transition-all shadow-[0_0_15px_rgba(0,240,255,0.2)]";
                btnHard.className = "px-6 py-2 rounded-full border border-white/10 bg-white/5 text-neutral-400 font-medium tracking-wide hover:text-white hover:bg-white/10 transition-all";
            }
            
            createGlassRadarChart(currentSkills);
            renderSkillsList(currentSkills);
        }

        function renderSkillsList(skills) {
            const listContainer = document.getElementById('skills-list');
            listContainer.innerHTML = '';
            
            skills.forEach((skill, index) => {
                const div = document.createElement('div');
                div.className = "glass-panel px-6 py-5 rounded-2xl flex justify-between items-center group glow-hover transition-all duration-300 cursor-default opacity-0 translate-y-4";
                div.innerHTML = `
                    <span class="text-neutral-300 font-medium tracking-wide uppercase group-hover:text-white transition-colors">${skill.name}</span>
                    <span class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-[#00f0ff] to-white group-hover:scale-110 transition-transform">${skill.score}</span>
                `;
                listContainer.appendChild(div);
                
                // Animate entry gracefully
                setTimeout(() => {
                    div.classList.remove('opacity-0', 'translate-y-4');
                    div.classList.add('opacity-100', 'translate-y-0');
                }, 50 * index);
            });
        }

        /**
         * Glassmorphism Radar Chart Generation
         */
        function createGlassRadarChart(skills) {
            const svg = document.getElementById('skillRadar');
            if (!svg) return;
            
            // Core dimensions matching viewBox
            const width = 600;
            const height = 600;
            const cx = width / 2;
            const cy = height / 2;
            const maxRadius = 240; 
            const numSkills = skills.length;
            const angleStep = (Math.PI * 2) / numSkills;

            let svgHTML = '';

            // 1. Concentric grid circles (Elegant subtle lines)
            for (let level = 1; level <= 5; level++) {
                const r = (maxRadius / 5) * level;
                let points = '';
                for (let i = 0; i < numSkills; i++) {
                    const angle = i * angleStep - Math.PI / 2;
                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);
                    points += `${x.toFixed(1)},${y.toFixed(1)} `;
                }
                const strokeOpacity = level === 5 ? '0.3' : '0.1';
                svgHTML += `<polygon points="${points.trim()}" fill="none" stroke="rgba(255,255,255,${strokeOpacity})" stroke-width="1.5" />`;
            }

            // 2. Axis lines from center
            for (let i = 0; i < numSkills; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const x2 = cx + maxRadius * Math.cos(angle);
                const y2 = cy + maxRadius * Math.sin(angle);
                svgHTML += `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />`;
            }

            // 3. Data polygon + fill (Neon Glow)
            let dataPoints = '';
            let polygonPoints = '';
            const dataCoords = [];

            for (let i = 0; i < numSkills; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const normalized = skills[i].score / 100;
                const x = cx + (maxRadius * normalized) * Math.cos(angle);
                const y = cy + (maxRadius * normalized) * Math.sin(angle);
                
                polygonPoints += `${x.toFixed(1)},${y.toFixed(1)} `;
                dataCoords.push({ x: x.toFixed(1), y: y.toFixed(1) });
            }

            // The Neon Glow shape
            svgHTML += `
                <polygon points="${polygonPoints.trim()}" 
                         fill="url(#neonGradient)" 
                         fill-opacity="0.8" 
                         stroke="#00f0ff" 
                         stroke-width="3" 
                         stroke-linejoin="round"
                         filter="drop-shadow(0 0 15px rgba(0,240,255,0.4))" />`;

            // Adding a defs block for gradients
            svgHTML += `
                <defs>
                    <radialGradient id="neonGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(0, 240, 255, 0.3)" />
                        <stop offset="100%" stop-color="rgba(0, 87, 255, 0.1)" />
                    </radialGradient>
                </defs>
            `;

            // 4. Data points (Glowing Dots)
            dataCoords.forEach(point => {
                svgHTML += `
                    <circle cx="${point.x}" cy="${point.y}" r="6" 
                            fill="#00f0ff" 
                            stroke="#030303" 
                            stroke-width="3" 
                            filter="drop-shadow(0 0 6px #00f0ff)" />`;
            });

            // 5. Elegant Skill Labels (Positioned outward without rotation for legibility)
            const labelRadius = maxRadius + 35;
            for (let i = 0; i < numSkills; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const x = cx + labelRadius * Math.cos(angle);
                const y = cy + labelRadius * Math.sin(angle);
                
                // Smart anchor alignment based on position relative to center
                let textAnchor = "middle";
                if (x < cx - 20) textAnchor = "end";
                else if (x > cx + 20) textAnchor = "start";
                
                // Smart baseline alignment
                let alignmentBaseline = "middle";
                if (y < cy - 20) alignmentBaseline = "baseline"; // Push up slightly
                else if (y > cy + 20) alignmentBaseline = "hanging"; // Push down slightly

                // Extra shifts for specific axes to prevent overlap
                let finalX = x;
                let finalY = y;
                if (textAnchor === "start") finalX += 10;
                if (textAnchor === "end") finalX -= 10;
                if (alignmentBaseline === "baseline") finalY -= 5;
                if (alignmentBaseline === "hanging") finalY += 5;

                svgHTML += `
                    <text x="${finalX.toFixed(1)}" y="${finalY.toFixed(1)}" 
                          text-anchor="${textAnchor}" 
                          dominant-baseline="${alignmentBaseline}" 
                          fill="#e5e5e5" 
                          font-family="system-ui, -apple-system, sans-serif" 
                          font-size="16" 
                          font-weight="500"
                          letter-spacing="0.05em">
                      ${skills[i].name}
                    </text>`;
            }

            svg.innerHTML = svgHTML;
        }

        // Initialize the chart
        document.addEventListener('DOMContentLoaded', () => {
            switchTab('hard'); // Load hard skills by default
        });
    </script>
</body>
</html>
